    volumes:
      - ./agents/senior_dev:/agent
      - workspace:/workspace
    environment:
      ROLE: senior_dev_1
      INSTANCE_ID: "1"
      MENTEE_ROLE: junior_dev_1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://redis:6379
